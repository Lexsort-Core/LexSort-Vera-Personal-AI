name: Build & Release VERA Freeware

on:
  push:
    tags:
      - 'v*'

jobs:
  # Windows build
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install frontend dependencies
        run: npm ci
        working-directory: lexsort-personal-ai
      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        working-directory: lexsort-personal-ai
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: lexsort-personal-ai/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  # Linux builds
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install frontend dependencies
        run: npm ci
        working-directory: lexsort-personal-ai
      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        working-directory: lexsort-personal-ai
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: |
            lexsort-personal-ai/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            lexsort-personal-ai/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  # macOS builds - FIXED to avoid queue delays
  build-macos:
    runs-on: macos-latest  # Changed from macos-13 to macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install frontend dependencies
        run: npm ci
        working-directory: lexsort-personal-ai
      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        working-directory: lexsort-personal-ai
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: lexsort-personal-ai/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # Create GitHub Release
  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: ls -R artifacts
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          draft: false  # Immediate public access
          generate_release_notes: true
          files: |
            artifacts/windows-x86_64-pc-windows-msvc/*.msi
            artifacts/linux-x86_64-unknown-linux-gnu/*.AppImage
            artifacts/linux-x86_64-unknown-linux-gnu/*.deb
            artifacts/macos-aarch64-apple-darwin/*.dmg
            artifacts/macos-x86_64-apple-darwin/*.dmg
